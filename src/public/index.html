<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Team Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">GPT Team Manager</a>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-light btn-sm active">Accounts</a>
        <a href="orgs.html" class="btn btn-outline-light btn-sm">Organizations</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    <!-- Import CSV -->
    <div class="card mb-3">
      <div class="card-body">
        <h6 class="card-title mb-2">Import CSV</h6>
        <form id="importForm" class="d-flex gap-2 align-items-center">
          <input type="file" class="form-control form-control-sm" id="csvFile" accept=".csv" style="max-width:300px">
          <button type="submit" class="btn btn-primary btn-sm">Import</button>
        </form>
        <div id="importResult" class="mt-2 small"></div>
      </div>
    </div>

    <!-- Accounts Table -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Accounts <span id="accountCount" class="badge bg-secondary">0</span></span>
        <button class="btn btn-sm btn-outline-primary" onclick="loadAccounts()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Email</th>
              <th>Status</th>
              <th>Plan</th>
              <th>2FA Code</th>
              <th>Org ID</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="accountsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Account Detail Modal -->
  <div class="modal fade" id="accountModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Account Detail</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="accountDetail"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/accounts.js"></script>
</body>
</html>
