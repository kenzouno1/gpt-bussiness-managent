<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizations - GPT Team Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">GPT Team Manager</a>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-light btn-sm">Accounts</a>
        <a href="orgs.html" class="btn btn-outline-light btn-sm active">Organizations</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    <!-- Orgs Table -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Organizations <span id="orgCount" class="badge bg-secondary">0</span></span>
        <button class="btn btn-sm btn-outline-primary" onclick="loadOrgs()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Org Account ID</th>
              <th>Plan</th>
              <th>Members</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orgsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Org Detail Modal -->
  <div class="modal fade" id="orgModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="orgModalTitle">Organization</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orgDetail"></div>
        <div class="modal-footer">
          <button class="btn btn-success btn-sm" id="btnAutoInvite">
            <i class="bi bi-send"></i> Auto Invite All Accounts
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/orgs.js"></script>
</body>
</html>
